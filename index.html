<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수아람수학학원</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: #1f2a6b;
      color: #ffffff;
      line-height: 1.6;
    }
    .topbar {
      width: 100%;
      background: #1a235c;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand {
      color: #ffd84d;
      font-size: 32px;
      font-weight: 700;
      margin: 0;
    }
    .top-phone {
      color: #ffd84d;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: start;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,216,77,0.2);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }
    .info-block {
      margin-bottom: 28px;
    }
    .label {
      color: #ffd84d;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .text {
      font-size: 18px;
      color: #ffffff;
    }
    .small {
      color: #ffd84d;
      font-size: 17px;
      margin-top: 8px;
    }
    .blog-link {
      color: #ffffff;
      text-decoration: underline;
      word-break: break-all;
      font-size: 18px;
    }
    .map-box img {
      width: 100%;
      display: block;
      border-radius: 18px;
      background: #ffffff;
    }
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      color: #ffd84d;
      font-size: 18px;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }
      .brand {
        font-size: 26px;
      }
      .top-phone {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <h1 class="brand">수아람수학학원</h1>
      <div class="top-phone">031-565-5536</div>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <div class="card map-box">
        <img src="map-illustration-81pw02-0.png" alt="수아람수학학원 약도" />
      </div>

      <div class="card">
        <div class="info-block">
          <div class="label">주소</div>
          <div class="text">경기도 구리시 수택동 850</div>
          <div class="text">청림빌딩 5층 501호</div>
          <div class="small">8호선 장자호수공원역 4번 출구에서 538m</div>
        </div>

        <div class="info-block">
          <div class="label">전화 상담</div>
          <div class="text">031-565-5536</div>
          <div class="text">0507-1332-5536</div>
        </div>

        <div class="info-block">
          <div class="label">블로그</div>
          <a class="blog-link" href="https://blog.naver.com/thoth_math" target="_blank">
            blog.naver.com/thoth_math
          </a>
        </div>
      </div>
    </div>

    <div class="footer">수아람수학학원</div>
  </div>
</body>
</html>
